# == BASE CONFIG ==

# Enable true color support
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-kitty:Tc"

# Enable mouse support
set -g mouse on

# Increase history limit
set -g history-limit 5001

# Numbering begins from 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set prefix to Ctrl + Space
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# enable vi-mode and some vi bindings
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel # yank and exit copy-mode
bind-key -T copy-mode-vi 'Y' send-keys -X copy-selection # yank without exiting

# disable kill pane / window confirmation
bind-key x kill-pane
bind-key & kill-window

# reload keybind
bind-key r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"


# Plugins
set -g @plugin 'tmux-plugins/tpm' # tmux package manager
set -g @plugin 'tmux-plugins/tmux-sensible' # sane default options
set -g @plugin 'christoomey/vim-tmux-navigator' # easy switching between vim / tmux splits
set -g @plugin 'tmux-plugins/tmux-yank' # yank from terminal output via vim motions
set -g @plugin 'tmux-plugins/tmux-pain-control' # better pane controls
set -g @plugin 'tmux-plugins/tmux-resurrect' # restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum' # autosave when combined with resurrect
set -g @plugin 'tmux-plugins/tmux-open' # open URLs and files from copy mode

# Enable auto-restore
set -g @resurrect-strategy-vim 'session'
#set -g @continuum-restore 'on'

# Select theme here
source-file ~/.config/tmux/theme.conf

# run tpm
run ~/.config/tmux/plugins/tpm/tpm

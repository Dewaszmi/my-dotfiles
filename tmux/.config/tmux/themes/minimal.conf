set -g status-style bg=default
set -g status-fg white
set -g mode-style fg=black,bg=magenta
set -g pane-border-style fg="#333333"
set -g pane-active-border-style fg="#5f8787"
set-option -g status-position top

set -g status-left "#[fg=green,bold] #S #[default] "
set -g status-right "#{prefix_highlight} #[fg=magenta] ^_^ %a %Y-%m-%d %H:%M #[default] "
set -g status-right-length 50

setw -g window-status-bell-style 'fg=yellow bg=red bold'
set -g message-style 'fg=yellow bg=black bold'

setw -g window-status-current-style 'fg=black bg=blue'
setw -g window-status-current-format ' #I #W '

